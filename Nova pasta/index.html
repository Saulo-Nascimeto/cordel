<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <!-- Faz o site se ajustar ao tamanho da tela do celular -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Site Profissional</title>
    
    <style>
        /* O "Pulo do Gato": Configuração global */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box; /* Garante que padding/borda não quebrem o layout */
        }

        body {
            font-family: sans-serif;
            line-height: 1.6rem ;
            background-color: #f0f0f0;
        }

        header {
            background: #333;
            color: white;
            padding:1rem;
            text-align: center;
        }

        nav ul {
            display: flex;
            justify-content: center;
            list-style: none;
            background: #444;
        }

        nav a {
            color: white;
            padding: 15px;
            text-decoration: none;
            display: block;
        }

        main {
            max-width: 800px;
            margin: 20px auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
        }

        footer {
            text-align: center;
            padding: 20px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>Logotipo do Site</h1>
    </header>

    <nav>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Sobre</a></li>
            <li><a href="#">Contato</a></li>
        </ul>
    </nav>

    <main>
        <section>
            <h2>Bem-vindo!</h2>
            <p>Este é um parágrafo dentro de uma seção do conteúdo principal.</p>
        </section>

        <article>
            <h3>Título de um Post</h3>
            <p>Aqui vai um texto de notícia ou blog, organizado dentro da tag article.</p>
            <img src="https://via.placeholder.com" alt="Exemplo de imagem">
        </article>
    </main>

   
        <footer>
    <p>&copy; 2026 <strong>Saulo-Nascimento</strong>. Todos os direitos reservados.</p>
</footer>

   

</body>
</html>
